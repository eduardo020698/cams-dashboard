<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calidad del Aire · Perú | CAMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--panel2:#273449;--txt:#e2e8f0;--mut:#94a3b8;--acc:#38bdf8}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);flex-wrap:wrap;z-index:1200;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  header h1{font-size:17px;font-weight:600;letter-spacing:.3px}
  header h1 span{color:var(--acc)}
  .sub{font-size:11px;color:var(--mut)}
  .chips{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .chip{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:var(--panel2);color:var(--txt);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--acc)}
  .chip.on{background:var(--acc);color:#082f49;border-color:var(--acc)}
  #wrap{flex:1;position:relative;display:flex;min-height:0}
  #map{flex:1;background:#0b1220}
  #panel{width:0;overflow:hidden;background:var(--panel);transition:width .25s;display:flex;flex-direction:column}
  #panel.open{width:380px;border-left:1px solid #334155}
  #panel .inner{padding:14px;overflow-y:auto;min-width:380px}
  #panel h2{font-size:14px;margin-bottom:2px}
  #panel .coords{font-size:11px;color:var(--mut);margin-bottom:10px}
  #closeP{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
  td{padding:5px 4px;border-bottom:1px solid #33415555}
  td:last-child{text-align:right;font-weight:600}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px;vertical-align:-1px}
  #chartBox{background:var(--panel2);border-radius:10px;padding:10px}
  #chartTitle{font-size:12px;color:var(--mut);margin-bottom:6px}
  footer{background:var(--panel);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:1200}
  #play{width:34px;height:34px;border-radius:50%;border:none;background:var(--acc);color:#082f49;font-size:14px;cursor:pointer}
  #slider{flex:1;min-width:160px;accent-color:var(--acc)}
  #tlabel{font-size:13px;font-weight:600;min-width:210px}
  #legend{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--mut)}
  #legend .lg{width:34px;height:12px;text-align:center;color:#fff;font-size:9px;line-height:12px;text-shadow:0 0 3px #000}
  #status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172acc;z-index:1500;font-size:15px}
  #demoBanner{display:none;background:#b45309;color:#fff;text-align:center;font-size:12px;padding:4px}
  .leaflet-container{font:inherit}
  @media(max-width:700px){#panel.open{width:100%;position:absolute;right:0;top:0;bottom:0;z-index:1100}}
</style>
</head>
<body>
<div id="app">
  <div id="demoBanner">⚠ DATA DE DEMOSTRACIÓN (sintética) — aún no conectada a CAMS</div>
  <header>
    <div>
      <h1>Calidad del Aire · <span>Perú y Pacífico Oriental</span></h1>
      <div class="sub" id="updated">CAMS Global Forecasts (Copernicus) · superficie · cargando…</div>
    </div>
    <div class="chips" id="chips"></div>
  </header>
  <div id="wrap">
    <div id="map"></div>
    <div id="panel">
      <div class="inner" style="position:relative">
        <button id="closeP">✕</button>
        <h2>Punto seleccionado</h2>
        <div class="coords" id="pcoords"></div>
        <table id="ptable"></table>
        <div id="chartBox">
          <div id="chartTitle"></div>
          <canvas id="chart" height="220"></canvas>
        </div>
      </div>
    </div>
    <div id="status">Cargando datos de CAMS…</div>
  </div>
  <footer>
    <button id="play" title="Animar">▶</button>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
    <div id="tlabel">—</div>
    <div id="legend"></div>
  </footer>
</div>

<script>
"use strict";
// ---------- configuración de contaminantes ----------
const POLL = {
  pm25:{name:"PM2.5", bp:[0,12,25,50,100,250]},
  pm10:{name:"PM10",  bp:[0,20,50,100,200,400]},
  o3:  {name:"O₃",    bp:[0,50,100,150,200,300]},
  no2: {name:"NO₂",   bp:[0,10,25,50,100,200]},
  so2: {name:"SO₂",   bp:[0,5,20,50,125,350]}
};
const COLORS = ["#22c55e","#eab308","#f97316","#ef4444","#a855f7","#7f1d1d"];
const TZ = "America/Lima";

let cur = "pm25";           // contaminante activo
let days = [];              // [{date, meta, vars}]
let frames = [];            // [{d:idxDia, h:idxHora, t:Date}]
let fi = 0;                 // frame actual
let overlay = null, marker = null, chart = null, playTimer = null;
let sel = null;             // {i,j,lat,lon}

// ---------- mapa ----------
const map = L.map("map",{zoomControl:true, worldCopyJump:false}).setView([-9.2,-77.5],5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {attribution:"© OpenStreetMap · © CARTO · Datos: Copernicus CAMS", maxZoom:10, minZoom:3}).addTo(map);

// ---------- helpers ----------
function colorFor(v, key){
  const bp = POLL[key].bp;
  if (v < 0 || v == null || isNaN(v)) return null;
  for (let k = bp.length-1; k >= 1; k--) if (v >= bp[k]) return COLORS[Math.min(k, COLORS.length-1)];
  // interpolar dentro del primer tramo para suavidad visual
  return COLORS[0];
}
function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgba(v, key){
  const bp = POLL[key].bp;
  if (v < 0 || v == null || isNaN(v)) return [0,0,0,0];
  let k = 0;
  while (k < bp.length-1 && v >= bp[k+1]) k++;
  const lo = bp[k], hi = (k < bp.length-1) ? bp[k+1] : bp[k]*1.5+1;
  const f = Math.min(1, Math.max(0,(v-lo)/(hi-lo||1)));
  const c1 = hex2rgb(COLORS[k]), c2 = hex2rgb(COLORS[Math.min(k+1,COLORS.length-1)]);
  return [Math.round(c1[0]+(c2[0]-c1[0])*f), Math.round(c1[1]+(c2[1]-c1[1])*f),
          Math.round(c1[2]+(c2[2]-c1[2])*f), 175];
}
function fmtTime(d){
  return d.toLocaleString("es-PE",{timeZone:TZ, weekday:"short", day:"2-digit", month:"short",
    hour:"2-digit", minute:"2-digit"}) + " (hora Perú)";
}
function val(dayIdx, key, hourIdx, i, j){
  const day = days[dayIdx];
  const v = day.vars[key][hourIdx][i*day.meta.nlon + j];
  return v < 0 ? null : v;
}

// ---------- carga de datos ----------
async function loadAll(){
  const mf = await (await fetch("data/manifest.json?_=" + Date.now())).json();
  if (mf.demo) document.getElementById("demoBanner").style.display = "block";
  for (const ds of mf.dates){
    const d = await (await fetch(`data/${ds}.json`)).json();
    days.push({date:ds, meta:d, vars:d.vars});
  }
  days.forEach((day, di) => {
    day.meta.hours.forEach((h, hi) => {
      frames.push({d:di, h:hi, t:new Date(`${day.date}T${String(h).padStart(2,"0")}:00:00Z`)});
    });
  });
  frames.sort((a,b)=>a.t-b.t);
  const sl = document.getElementById("slider");
  sl.max = frames.length-1; sl.value = frames.length-1; fi = frames.length-1;
  document.getElementById("updated").textContent =
    `CAMS Global Forecasts (Copernicus) · concentraciones en superficie · actualizado: ${new Date(mf.updated).toLocaleString("es-PE",{timeZone:TZ})}`;
  document.getElementById("status").style.display = "none";
  buildChips(); buildLegend(); render();
}

// ---------- render de la capa ----------
function render(){
  const fr = frames[fi], day = days[fr.d], m = day.meta;
  const cv = document.createElement("canvas");
  cv.width = m.nlon; cv.height = m.nlat;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(m.nlon, m.nlat);
  const arr = day.vars[cur][fr.h];
  for (let i = 0; i < m.nlat; i++){
    for (let j = 0; j < m.nlon; j++){
      const [r,g,b,a] = rgba(arr[i*m.nlon+j], cur);
      const p = (i*m.nlon+j)*4;
      img.data[p]=r; img.data[p+1]=g; img.data[p+2]=b; img.data[p+3]=a;
    }
  }
  ctx.putImageData(img,0,0);
  // reescalar con suavizado para look continuo
  const big = document.createElement("canvas");
  big.width = m.nlon*8; big.height = m.nlat*8;
  const bctx = big.getContext("2d");
  bctx.imageSmoothingEnabled = true; bctx.imageSmoothingQuality = "high";
  bctx.drawImage(cv,0,0,big.width,big.height);
  const halfLat = Math.abs(m.dlat)/2, halfLon = Math.abs(m.dlon)/2;
  const latMax = Math.max(m.lat0, m.lat0 + m.dlat*(m.nlat-1));
  const latMin = Math.min(m.lat0, m.lat0 + m.dlat*(m.nlat-1));
  const bounds = [[latMin-halfLat, m.lon0-halfLon],
                  [latMax+halfLat, m.lon0 + m.dlon*(m.nlon-1) + halfLon]];
  if (overlay) overlay.setUrl(big.toDataURL());
  else overlay = L.imageOverlay(big.toDataURL(), bounds, {opacity:0.72, interactive:false}).addTo(map);
  document.getElementById("tlabel").textContent = fmtTime(fr.t);
  if (sel) updatePanel();
}

// ---------- UI: chips y leyenda ----------
function buildChips(){
  const box = document.getElementById("chips"); box.innerHTML = "";
  for (const k in POLL){
    const b = document.createElement("button");
    b.className = "chip" + (k===cur ? " on" : "");
    b.textContent = POLL[k].name;
    b.onclick = () => { cur = k; document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
      b.classList.add("on"); buildLegend(); render(); };
    box.appendChild(b);
  }
}
function buildLegend(){
  const lg = document.getElementById("legend");
  const bp = POLL[cur].bp;
  lg.innerHTML = `<span style="margin-right:4px">${POLL[cur].name} µg/m³</span>` +
    bp.slice(0,-1).map((v,k)=>`<div class="lg" style="background:${COLORS[k]}">${v}</div>`).join("") +
    `<div class="lg" style="background:${COLORS[COLORS.length-1]}">${bp[bp.length-1]}+</div>`;
}

// ---------- clic en el mapa: panel + tendencia 48 h ----------
map.on("click", e => {
  const m = days[0].meta;
  const i = Math.round((e.latlng.lat - m.lat0)/m.dlat);
  let lon = e.latlng.lng;
  const j = Math.round((lon - m.lon0)/m.dlon);
  if (i<0 || i>=m.nlat || j<0 || j>=m.nlon) return;
  sel = {i, j, lat: m.lat0 + i*m.dlat, lon: m.lon0 + j*m.dlon};
  if (marker) marker.setLatLng([sel.lat, sel.lon]);
  else marker = L.circleMarker([sel.lat, sel.lon],{radius:7,color:"#fff",weight:2,fillColor:"#38bdf8",fillOpacity:.9}).addTo(map);
  document.getElementById("panel").classList.add("open");
  setTimeout(()=>map.invalidateSize(), 300);
  updatePanel();
});
document.getElementById("closeP").onclick = () => {
  document.getElementById("panel").classList.remove("open");
  if (marker){ map.removeLayer(marker); marker = null; }
  sel = null; setTimeout(()=>map.invalidateSize(), 300);
};

function updatePanel(){
  const fr = frames[fi];
  document.getElementById("pcoords").textContent =
    `${Math.abs(sel.lat).toFixed(1)}°${sel.lat<0?"S":"N"}, ${Math.abs(sel.lon).toFixed(1)}°${sel.lon<0?"O":"E"} · ${fmtTime(fr.t)}`;
  // tabla de valores actuales
  let rows = "";
  for (const k in POLL){
    const v = val(fr.d, k, fr.h, sel.i, sel.j);
    const c = v==null ? "#475569" : `rgb(${rgba(Math.max(v,0.01),k).slice(0,3).join(",")})`;
    rows += `<tr><td><span class="dot" style="background:${c}"></span>${POLL[k].name}</td>
             <td>${v==null?"—":v.toFixed(k==="so2"||k==="no2"?2:1)} µg/m³</td></tr>`;
  }
  document.getElementById("ptable").innerHTML = rows;
  drawChart();
}

function drawChart(){
  // últimas 48 h respecto al último frame disponible
  const tEnd = frames[frames.length-1].t.getTime();
  const win = frames.filter(f => tEnd - f.t.getTime() <= 48*3600*1000);
  const labels = win.map(f => f.t.toLocaleString("es-PE",{timeZone:TZ, weekday:"short", hour:"2-digit"}));
  const data = win.map(f => val(f.d, cur, f.h, sel.i, sel.j));
  document.getElementById("chartTitle").textContent =
    `Tendencia ${POLL[cur].name} · últimas 48 h · µg/m³`;
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: { labels, datasets: [{
      data, borderColor: "#38bdf8", backgroundColor: "#38bdf833",
      fill: true, tension: .35, pointRadius: 2.5, pointBackgroundColor: "#38bdf8"
    }]},
    options: {
      plugins: { legend: {display:false}, tooltip: {callbacks:{
        label: c => ` ${c.parsed.y?.toFixed(2)} µg/m³` }} },
      scales: {
        x: { ticks: {color:"#94a3b8", maxTicksLimit:8, font:{size:10}}, grid:{color:"#33415544"} },
        y: { ticks: {color:"#94a3b8", font:{size:10}}, grid:{color:"#33415544"}, beginAtZero:true }
      }
    }
  });
}

// ---------- slider y animación ----------
document.getElementById("slider").oninput = e => { fi = +e.target.value; render(); };
document.getElementById("play").onclick = function(){
  if (playTimer){ clearInterval(playTimer); playTimer = null; this.textContent = "▶"; return; }
  this.textContent = "⏸";
  playTimer = setInterval(() => {
    fi = (fi + 1) % frames.length;
    document.getElementById("slider").value = fi;
    render();
  }, 650);
};

loadAll().catch(err => {
  document.getElementById("status").innerHTML =
    "No se pudo cargar la data.<br><small>Si abriste el archivo localmente, usa un servidor: <code>python -m http.server</code></small>";
  console.error(err);
});
</script>
</body>
</html>
